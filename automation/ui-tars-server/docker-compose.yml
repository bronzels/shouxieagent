services:
  ui-tars:
    build:
      context: .
      dockerfile: Dockerfile
    image: ui-tars:latest
    container_name: ui-tars
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /mnt/ext4disk/ui-tars/models:/models:ro
    environment:
      - MODEL_PATH=/models/UI-TARS-1.5-7B-q4_k_m.gguf
      - MMPROJ_PATH=/models/UI-TARS-1.5-7B-q8_0.mmproj
      - N_CTX=8192
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
